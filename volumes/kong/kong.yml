_format_version: '1.1'

###############################################################################
# Serviços que o Kong vai fazer proxy
###############################################################################
services:

  ## PostgREST — API REST do banco
  - name: postgrest
    url: http://rest:3000/
    routes:
      - name: postgrest-all
        strip_path: true
        paths:
          - /rest/v1/
    plugins:
      - name: cors

  ## GoTrue — Autenticação
  - name: gotrue
    url: http://auth:9999/
    routes:
      - name: gotrue-all
        strip_path: true
        paths:
          - /auth/v1/
    plugins:
      - name: cors

  ## pg-meta — Usado pelo Studio
  - name: pg-meta
    url: http://meta:8080/
    routes:
      - name: pg-meta-all
        strip_path: true
        paths:
          - /pg/

###############################################################################
# Consumers (usuários anônimos e service_role para o Supabase JS)
###############################################################################
consumers:
  - username: anon
    keyauth_credentials:
      - key: ${ANON_KEY}

  - username: service_role
    keyauth_credentials:
      - key: ${SERVICE_ROLE_KEY}
